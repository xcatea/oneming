<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>页面不存在 - 一命 ONEMING</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#ece5d6;--ink:#211d18;--soft:#5a5246;--jade:#4c6b5e;--seal:#9e342a}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"Noto Serif SC",Georgia,serif;line-height:1.8;display:flex;min-height:100vh;align-items:center;justify-content:center}
.wrap{text-align:center;padding:24px}
.seal{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:12px;background:var(--seal);color:#f3ece1;font-weight:700;font-size:34px}
h1{font-size:26px;margin:20px 0 6px}
p{color:var(--soft);font-size:15px;margin:6px 0}
a.btn{display:inline-block;margin-top:22px;background:var(--ink);color:var(--paper);padding:12px 28px;border-radius:999px;font-size:15px;text-decoration:none}
a{color:var(--jade)}
</style>
</head>
<body>
<div class="wrap">
  <div class="seal">命</div>
  <h1>这一页不在命里</h1>
  <p>你要找的页面不存在或已被移动。</p>
  <p>去 <a href="/term/">命理小词典</a> 看看，或回首页排一张你的命盘。</p>
  <a class="btn" href="/">返回首页</a>
</div>
</body>
</html>
